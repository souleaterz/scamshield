<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif; }
      body { width: 340px; margin: 0; padding: 16px; background: #f8fafc; color: #0f172a; }
      h1 { display: flex; align-items: center; gap: 6px; font-size: 16px; margin: 0 0 4px; }
      p.sub { margin: 0 0 12px; font-size: 12px; color: #64748b; }
      textarea {
        width: 100%; height: 96px; resize: none; border: 1px solid #e2e8f0;
        border-radius: 10px; padding: 10px; font-size: 13px; background: #fff;
      }
      textarea:focus { outline: none; border-color: #60a5fa; box-shadow: 0 0 0 3px #dbeafe; }
      button.check {
        margin-top: 10px; width: 100%; border: none; border-radius: 10px;
        background: #2563eb; color: #fff; font-size: 14px; font-weight: 600;
        padding: 9px; cursor: pointer;
      }
      button.check:disabled { background: #cbd5e1; cursor: not-allowed; }
      button.secondary {
        margin-top: 8px; width: 100%; border: 1px solid #cbd5e1; border-radius: 10px;
        background: #fff; color: #334155; font-size: 13px; font-weight: 600;
        padding: 8px; cursor: pointer;
      }
      button.secondary:disabled { opacity: .6; cursor: not-allowed; }
      .badge { display: inline-block; font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 999px; color: #fff; }
      .result { margin-top: 14px; background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 14px; display: none; }
      .summary { margin: 10px 0 0; font-size: 13px; line-height: 1.45; }
      .meta { margin-top: 6px; font-size: 12px; color: #64748b; }
      .muted { font-size: 13px; color: #475569; }
      .flags { margin-top: 10px; }
      .li { font-size: 12px; color: #334155; margin: 3px 0; }
      .dot { color: #ef4444; margin-right: 6px; }
      .hint { margin-top: 14px; font-size: 12px; color: #64748b; text-align: center; }
      a { color: #2563eb; text-decoration: none; }
    </style>
  </head>
  <body>
    <h1>🛡️ ScamShield</h1>
    <p class="sub">Paste a message, link, or number to check it.</p>

    <textarea id="input" placeholder="Paste the suspicious text here…"></textarea>
    <button class="check" id="check">Check for scams</button>
    <button class="secondary" id="shot">📸 Scan this page (screenshot)</button>

    <div class="result" id="result"></div>

    <p class="hint">Tip: select any text on a page, right-click → “Check with ScamShield”.</p>

    <script src="config.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
