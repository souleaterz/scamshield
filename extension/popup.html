<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root { color-scheme: light; }

      body {
        width: 300px;
        background: #f1f5f9;
        font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
        color: #0f172a;
        padding-bottom: 8px;
      }

      /* ── Header ── */
      .header {
        display: flex; align-items: center; gap: 10px;
        background: #1e40af; color: #fff;
        padding: 14px 16px;
      }
      .header-icon { font-size: 24px; line-height: 1; }
      .header-brand { font-size: 16px; font-weight: 700; letter-spacing: -.3px; }
      .header-tag   { font-size: 11px; opacity: .75; margin-top: 1px; }

      /* ── Cards ── */
      .card {
        background: #fff;
        border-radius: 12px;
        margin: 10px 10px 0;
        padding: 14px 16px;
        box-shadow: 0 1px 3px rgba(0,0,0,.07);
      }
      .card-row {
        display: flex; align-items: center; justify-content: space-between; gap: 12px;
      }
      .card-label { font-size: 13px; font-weight: 600; color: #0f172a; }
      .card-sub   { font-size: 11px; color: #64748b; margin-top: 3px; }

      /* ── Toggle switch ── */
      .toggle { position: relative; display: inline-block; flex-shrink: 0; cursor: pointer; }
      .toggle input { position: absolute; opacity: 0; width: 0; height: 0; }
      .track {
        display: block; width: 44px; height: 25px;
        background: #cbd5e1; border-radius: 999px;
        transition: background .2s;
        position: relative;
      }
      .thumb {
        position: absolute; top: 2.5px; left: 3px;
        width: 20px; height: 20px; border-radius: 50%;
        background: #fff; transition: transform .2s;
        box-shadow: 0 1px 4px rgba(0,0,0,.25);
      }
      .toggle input:checked + .track { background: #2563eb; }
      .toggle input:checked + .track .thumb { transform: translateX(19px); }

      /* ── Scan button ── */
      .scan-btn {
        display: flex; align-items: center; justify-content: center; gap: 7px;
        width: calc(100% - 20px); margin: 10px 10px 0;
        border: none; border-radius: 12px;
        background: #0f172a; color: #fff;
        font-size: 13px; font-weight: 600;
        padding: 11px 16px; cursor: pointer;
        transition: background .15s;
      }
      .scan-btn:hover:not(:disabled) { background: #1e293b; }
      .scan-btn:disabled { background: #cbd5e1; color: #94a3b8; cursor: not-allowed; }

      /* ── Result area ── */
      .result {
        background: #fff; border-radius: 12px;
        margin: 10px 10px 0; padding: 14px 16px;
        box-shadow: 0 1px 3px rgba(0,0,0,.07);
        display: none;
      }
      .badge {
        display: inline-block; font-size: 11px; font-weight: 700;
        padding: 3px 10px; border-radius: 999px; color: #fff;
      }
      .r-summary { font-size: 12px; line-height: 1.5; color: #1e293b; margin-top: 8px; }
      .r-meta    { font-size: 11px; color: #64748b; margin-top: 5px; }
      .r-flags   { margin-top: 8px; }
      .r-flag    { font-size: 11px; color: #334155; margin: 3px 0; }
      .r-dot     { color: #ef4444; margin-right: 5px; }
      .r-link    { font-size: 11px; color: #2563eb; text-decoration: none; }
      .r-link:hover { text-decoration: underline; }
      .r-muted   { font-size: 12px; color: #64748b; }

      /* ── Auth footer ── */
      .auth {
        display: flex; align-items: center; justify-content: space-between;
        margin: 10px 10px 0; padding: 0 4px;
      }
      .auth-text { font-size: 11px; color: #64748b; }
      .auth-text.ok { color: #16a34a; font-weight: 600; }
      .auth-btn {
        font-size: 11px; font-weight: 600; color: #2563eb;
        background: none; border: none; cursor: pointer; padding: 0;
        text-decoration: none;
      }
      .auth-btn:hover { text-decoration: underline; }

      /* ── Tip ── */
      .tip {
        font-size: 10px; color: #94a3b8; text-align: center;
        margin: 10px 10px 2px; line-height: 1.4;
      }
    </style>
  </head>
  <body>

    <div class="header">
      <span class="header-icon">🛡️</span>
      <div>
        <div class="header-brand">Guardurai</div>
        <div class="header-tag">Real-time scam protection</div>
      </div>
    </div>

    <!-- Passive protection toggle -->
    <div class="card">
      <div class="card-row">
        <div>
          <div class="card-label">Passive protection</div>
          <div class="card-sub" id="passive-sub">Warns you on risky pages automatically</div>
        </div>
        <label class="toggle" title="Toggle passive protection">
          <input type="checkbox" id="passive-toggle" />
          <span class="track"><span class="thumb"></span></span>
        </label>
      </div>
    </div>

    <!-- Scan this page -->
    <button class="scan-btn" id="shot">
      <span>📸</span> Scan this page
    </button>

    <!-- Scan result -->
    <div class="result" id="result"></div>

    <!-- Auth status -->
    <div class="auth">
      <span class="auth-text" id="auth-text">Checking…</span>
      <button class="auth-btn" id="auth-btn" style="display:none"></button>
    </div>

    <p class="tip">Check with Guardurai.</p>

    <script src="config.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
